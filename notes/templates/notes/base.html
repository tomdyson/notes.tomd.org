{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}notes.tomd.org{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'notes/site.css' %}">
  <link rel="stylesheet" href="{% static 'notes/pygments.css' %}">
  {% block head_extra %}{% endblock %}
</head>
<body class="min-h-screen">
  <header class="border-b border-stone-200 bg-white/70 backdrop-blur">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
      <a href="/" class="font-serif text-xl tracking-tight">notes.tomd.org</a>
      <nav class="text-sm flex items-center gap-3">
        {% if user.is_authenticated %}
          <a href="{% url 'notes:new' %}" class="inline-flex items-center px-3 py-1.5 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700">New note</a>
          <a href="{% url 'notes:passkeys' %}" class="text-stone-500 hover:text-stone-800">Passkeys</a>
          <form method="post" action="{% url 'logout' %}" class="inline">{% csrf_token %}<button class="text-stone-500 hover:text-stone-800">Log out</button></form>
        {% else %}
          <a href="{% url 'login' %}" class="text-stone-500 hover:text-stone-800">Log in</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>
  {% block body_extra %}{% endblock %}
</body>
</html>
