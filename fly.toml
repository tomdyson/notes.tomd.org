app = 'notes-tomd-org'
primary_region = 'lhr'
console_command = '/app/manage.py shell'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = "data"
  destination = "/app/data"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
